<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <title>SwiftMart - Balurghat's Local Online Marketplace</title>
    <meta name="description" content="Order groceries, sweets, dairy, gifts, electronics accessories and more from local shops in Balurghat with SwiftMart." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SwiftMart" />
    <meta property="og:title" content="SwiftMart - Balurghat's Local Online Marketplace" />
    <meta property="og:description" content="Order groceries, sweets, dairy, gifts, electronics accessories and more from local shops in Balurghat with SwiftMart." />
    <meta property="og:url" content="https://swiftmart.space/" />
    <meta property="og:image" content="https://swiftmart.space/opengraph.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SwiftMart - Balurghat's Local Online Marketplace" />
    <meta name="twitter:description" content="Order groceries, sweets, dairy, gifts, electronics accessories and more from local shops in Balurghat with SwiftMart." />
    <meta name="twitter:image" content="https://swiftmart.space/opengraph.jpg" />

    <!-- Canonical -->
    <link rel="canonical" href="https://swiftmart.space/" />

    <!-- Icons & PWA -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f59e0b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SwiftMart" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <!-- Razorpay -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <!-- PWA Splash Screen -->
    <style>
      #swm-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #111111;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-family: system-ui, -apple-system, Arial, sans-serif;
        transition: opacity 0.45s ease;
      }
      #swm-splash.swm-hidden {
        opacity: 0;
        pointer-events: none;
      }
      .swm-blob-tr {
        position: absolute;
        top: -90px;
        right: -90px;
        width: 240px;
        height: 240px;
        background: #f59e0b;
        border-radius: 54% 46% 38% 62% / 58% 34% 66% 42%;
      }
      .swm-blob-bl {
        position: absolute;
        bottom: -90px;
        left: -90px;
        width: 240px;
        height: 240px;
        background: #f59e0b;
        border-radius: 42% 58% 62% 38% / 42% 66% 34% 58%;
      }
      .swm-logo {
        width: 150px;
        height: auto;
        margin-bottom: 22px;
        position: relative;
        z-index: 1;
        filter: drop-shadow(0 0 24px rgba(245,158,11,0.18));
      }
      .swm-brand {
        font-size: 38px;
        font-weight: 900;
        letter-spacing: 0.06em;
        position: relative;
        z-index: 1;
        line-height: 1;
      }
      .swm-brand-swift { color: #ffffff; }
      .swm-brand-mart  { color: #f59e0b; }
      .swm-tagline {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.22em;
        color: #f59e0b;
        margin-top: 8px;
        position: relative;
        z-index: 1;
      }
      .swm-dots {
        display: flex;
        gap: 9px;
        margin-top: 72px;
        position: relative;
        z-index: 1;
      }
      .swm-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #555;
        animation: swm-pulse 1.3s infinite ease-in-out;
      }
      .swm-dot:nth-child(2) { animation-delay: 0.22s; }
      .swm-dot:nth-child(3) { animation-delay: 0.44s; }
      @keyframes swm-pulse {
        0%, 80%, 100% { transform: scale(0.75); opacity: 0.35; }
        40%           { transform: scale(1.25); opacity: 1; background: #888; }
      }
      .swm-loading-text {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.28em;
        color: #555;
        margin-top: 11px;
        position: relative;
        z-index: 1;
      }
    </style>

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://swiftmart.space/#website",
          "url": "https://swiftmart.space/",
          "name": "SwiftMart",
          "description": "Order groceries, sweets, dairy, gifts, electronics accessories and more from local shops in Balurghat with SwiftMart.",
          "inLanguage": "en-IN"
        },
        {
          "@type": ["LocalBusiness", "Store"],
          "@id": "https://swiftmart.space/#business",
          "name": "SwiftMart",
          "url": "https://swiftmart.space/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://swiftmart.space/logo.png"
          },
          "image": "https://swiftmart.space/opengraph.jpg",
          "description": "Hyper-local online marketplace delivering groceries, sweets, dairy, gifts, electronics accessories and more from local Balurghat shops in 10 minutes.",
          "telephone": "+916296118949",
          "address": {
            "@type": "PostalAddress",
            "addressLocality": "Balurghat",
            "addressRegion": "West Bengal",
            "addressCountry": "IN"
          },
          "areaServed": {
            "@type": "City",
            "name": "Balurghat",
            "containedInPlace": {
              "@type": "State",
              "name": "West Bengal",
              "containedInPlace": {
                "@type": "Country",
                "name": "India"
              }
            }
          },
          "contactPoint": {
            "@type": "ContactPoint",
            "telephone": "+916296118949",
            "contactType": "customer support",
            "availableLanguage": ["English", "Bengali"]
          },
          "sameAs": [],
          "priceRange": "₹"
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="swm-splash" aria-hidden="true">
      <div class="swm-blob-tr"></div>
      <div class="swm-blob-bl"></div>
      <img class="swm-logo" src="/logo.png" alt="SwiftMart" />
      <div class="swm-brand">
        <span class="swm-brand-swift">SWIFT </span><span class="swm-brand-mart">MART</span>
      </div>
      <div class="swm-tagline">&#8212; LOCAL SHOPS, FAST DELIVERY &#8212;</div>
      <div class="swm-dots">
        <div class="swm-dot"></div>
        <div class="swm-dot"></div>
        <div class="swm-dot"></div>
      </div>
      <div class="swm-loading-text">LOADING...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
