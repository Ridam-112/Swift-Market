<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <!-- Default: all public pages are indexable. Private routes override this via RobotsManager in React. -->
    <meta name="robots" content="index,follow" />

    <!-- react-helmet-async manages all per-page title/meta/canonical/JSON-LD.
         These tags are fallbacks used only before React hydrates (e.g. opengraph crawlers
         that don't execute JS). Do NOT add duplicate meta here. -->
    <title>SwiftMart Balurghat | Grocery, Food, Medicine &amp; Quick Commerce Delivery</title>
    <meta name="description" content="Order groceries, vegetables, fruits, food, medicines, dairy, bakery, sweets and daily essentials from trusted local shops in Balurghat with SwiftMart. Fast local delivery." />
    <meta name="keywords" content="SwiftMart, SwiftMart Balurghat, Balurghat Grocery, Balurghat Online Shopping, Quick Commerce Balurghat, Food Delivery Balurghat" />
    <meta name="robots" content="index,follow" />

    <!-- Open Graph (static fallback — overridden per-page by react-helmet-async) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SwiftMart" />
    <meta property="og:title" content="SwiftMart Balurghat | Grocery, Food, Medicine &amp; Quick Commerce Delivery" />
    <meta property="og:description" content="Order groceries, vegetables, fruits, food, medicines, dairy, bakery, sweets and daily essentials from trusted local shops in Balurghat with SwiftMart." />
    <meta property="og:url" content="https://swiftmart.space/" />
    <meta property="og:image" content="https://swiftmart.space/opengraph.jpg" />

    <!-- Twitter Card (static fallback) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SwiftMart Balurghat | Grocery, Food, Medicine &amp; Quick Commerce Delivery" />
    <meta name="twitter:description" content="Order groceries, vegetables, fruits, food, medicines, dairy, bakery, sweets and daily essentials from trusted local shops in Balurghat with SwiftMart." />
    <meta name="twitter:image" content="https://swiftmart.space/opengraph.jpg" />

    <!-- Icons & PWA -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f59e0b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SwiftMart" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <!-- Razorpay — defer so it never blocks the HTML parser -->
    <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>

    <!-- PWA Splash Screen -->
    <style>
      #swm-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #0d0d0d;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-family: system-ui, -apple-system, Arial, sans-serif;
        transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #swm-splash.swm-hidden {
        opacity: 0;
        pointer-events: none;
      }

      /* Radial golden glow behind logo */
      .swm-glow {
        position: absolute;
        width: 340px;
        height: 340px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(245,158,11,0.18) 0%, transparent 70%);
        animation: swm-glow-pulse 2.4s ease-in-out infinite;
      }
      @keyframes swm-glow-pulse {
        0%, 100% { transform: scale(0.9); opacity: 0.6; }
        50%       { transform: scale(1.15); opacity: 1; }
      }

      /* Logo — zooms in with a spring bounce */
      .swm-logo {
        width: 220px;
        height: 220px;
        object-fit: contain;
        position: relative;
        z-index: 1;
        animation: swm-logo-in 0.75s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        filter: drop-shadow(0 0 32px rgba(245,158,11,0.35));
      }
      @keyframes swm-logo-in {
        0%   { opacity: 0; transform: scale(0.55); }
        100% { opacity: 1; transform: scale(1); }
      }

      /* Tagline fades + slides up after logo */
      .swm-tagline {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.28em;
        color: #f59e0b;
        margin-top: 6px;
        position: relative;
        z-index: 1;
        animation: swm-slide-up 0.6s 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
        text-transform: uppercase;
      }
      @keyframes swm-slide-up {
        0%   { opacity: 0; transform: translateY(16px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      /* Loading bar at the bottom */
      .swm-bar-wrap {
        position: absolute;
        bottom: 52px;
        width: 120px;
        height: 3px;
        border-radius: 99px;
        background: rgba(255,255,255,0.08);
        overflow: hidden;
        animation: swm-slide-up 0.4s 0.9s both;
      }
      .swm-bar {
        height: 100%;
        border-radius: 99px;
        background: linear-gradient(90deg, #f59e0b, #fbbf24, #f59e0b);
        background-size: 200% 100%;
        animation:
          swm-bar-fill 1.6s 0.95s ease-out both,
          swm-bar-shine 1.8s 1s linear infinite;
      }
      @keyframes swm-bar-fill {
        0%   { width: 0%; }
        100% { width: 100%; }
      }
      @keyframes swm-bar-shine {
        0%   { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      /* Version / powered-by text */
      .swm-powered {
        position: absolute;
        bottom: 28px;
        font-size: 9px;
        letter-spacing: 0.18em;
        color: #333;
        text-transform: uppercase;
        animation: swm-slide-up 0.4s 1.1s both;
      }
    </style>

    <!-- JSON-LD is injected per-page by react-helmet-async (see Home.tsx for homepage schema).
         Organization · WebSite · SearchAction · LocalBusiness · WebApplication · Product schemas
         are all managed dynamically so they stay accurate and de-duplicated. -->
  </head>
  <body>
    <div id="swm-splash" aria-hidden="true">
      <div class="swm-glow"></div>
      <img class="swm-logo" src="/logo.png" alt="SwiftMart" />
      <div class="swm-tagline">10-minute delivery · Balurghat</div>
      <div class="swm-bar-wrap"><div class="swm-bar"></div></div>
      <div class="swm-powered">SwiftMart &mdash; Local shops, fast delivery</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
