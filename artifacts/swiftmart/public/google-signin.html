<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in with Google – SwiftMart</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #111;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 24px;
    }
    img { height: 48px; width: auto; }
    p { font-size: 14px; color: #aaa; text-align: center; }
    #google-btn { min-height: 44px; }
    #status { font-size: 13px; color: #888; min-height: 20px; text-align: center; }
    #error-box { display: none; background: #330; border: 1px solid #a00; border-radius: 8px; padding: 12px 16px; font-size: 12px; color: #f88; max-width: 320px; word-break: break-all; text-align: left; }
    #origin-box { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 10px 14px; font-size: 11px; color: #aaa; max-width: 340px; word-break: break-all; text-align: center; }
    #origin-box strong { color: #ffcc44; font-size: 12px; display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
  <img src="/logo.png" alt="SwiftMart" onerror="this.style.display='none'" />
  <p>Sign in to continue to SwiftMart</p>
  <div id="origin-box">
    <strong>This window's origin (add this to Google Cloud Console):</strong>
    <span id="origin-display"></span>
  </div>
  <div id="google-btn"></div>
  <div id="status">Loading…</div>
  <div id="error-box"></div>

  <script>
    var params   = new URLSearchParams(window.location.search);
    var clientId = params.get('client_id');
    var origin   = window.location.origin; // always use the real current origin
    document.getElementById('origin-display').textContent = origin;

    function setStatus(msg) { document.getElementById('status').textContent = msg; }

    function showError(msg) {
      setStatus('');
      var box = document.getElementById('error-box');
      box.textContent = msg;
      box.style.display = 'block';
    }

    function sendResult(payload) {
      var sent = false;

      // Try window.opener.postMessage first (most reliable in Replit iframe setup)
      if (window.opener && !window.opener.closed) {
        try {
          window.opener.postMessage(payload, origin);
          sent = true;
        } catch (e) {
          console.warn('opener.postMessage failed:', e);
        }
      }

      // BroadcastChannel as fallback
      try {
        var ch = new BroadcastChannel('swiftmart-google-auth');
        ch.postMessage(payload);
        ch.close();
        sent = true;
      } catch (e) {
        console.warn('BroadcastChannel failed:', e);
      }

      if (!sent) {
        showError('Could not communicate with the app window. Please close this window and try again.');
        return;
      }

      setStatus('Signing you in…');
      setTimeout(function() { window.close(); }, 400);
    }

    function onCredential(response) {
      sendResult({ swiftmartGoogle: true, idToken: response.credential });
    }

    function initGIS() {
      if (!clientId) {
        showError('Configuration error: missing client_id. Please close this window and try again.');
        return;
      }
      setStatus('');
      try {
        google.accounts.id.initialize({
          client_id: clientId,
          callback: onCredential,
          auto_select: false,
          cancel_on_tap_outside: false,
          itp_support: true,
          use_fedcm_for_prompt: false,
        });
        google.accounts.id.renderButton(
          document.getElementById('google-btn'),
          { theme: 'outline', size: 'large', width: 320, text: 'continue_with', logo_alignment: 'left', shape: 'pill' }
        );
      } catch (e) {
        showError('Google sign-in failed to initialise: ' + (e && e.message ? e.message : String(e)));
      }
    }

    if (!clientId) {
      showError('No client_id in URL. Close this window and try again.');
    } else {
      var script = document.createElement('script');
      script.src = 'https://accounts.google.com/gsi/client';
      script.async = true;
      script.defer = true;
      script.onload = initGIS;
      script.onerror = function() { showError('Failed to load Google sign-in library. Check your internet connection.'); };
      document.head.appendChild(script);
    }
  </script>
</body>
</html>
