kind = "web"
previewPath = "/"
title = "SwiftMart"
version = "1.0.0"
id = "artifacts/swiftmart"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22169

[services.development]
run = "pnpm --filter @workspace/swiftmart run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/swiftmart", "run", "build" ]
publicDir = "artifacts/swiftmart/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22169"
BASE_PATH = "/"
